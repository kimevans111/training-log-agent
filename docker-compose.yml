services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
